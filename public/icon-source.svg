<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0B0D"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#D4FF3C" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect
    x="20"
    y="20"
    width="472"
    height="472"
